<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Halla Sinsara Hanji Brand Story</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
  background: #000;
  color: #fff;
  line-height: 1.7;
}
.page {
  min-height: 100vh;
  background: radial-gradient(circle at top, rgba(255,255,255,0.14), transparent 42%), #000;
}
.lang-switcher {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  gap: 8px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}
.lang-switcher button {
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: rgba(255,255,255,0.75);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
}
.lang-switcher button.active {
  background: #fff;
  color: #000;
  border-color: #fff;
}
.section { width: 100%; }
.hero {
  border-bottom: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
}
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 56px 20px;
}
.container-wide {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 20px 56px;
}
.eyebrow {
  margin: 0 0 16px;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  font-weight: 600;
}
h1, h2, h3, p { margin: 0; }
.hero h1, .story h2, .flow h2, .values h2, .closing h3 {
  white-space: pre-line;
  line-height: 1.15;
}
.hero h1 {
  font-size: 48px;
  font-weight: 800;
}
.hero .intro {
  margin-top: 20px;
  color: rgba(255,255,255,0.78);
  font-size: 18px;
}
.card {
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  border-radius: 28px;
  padding: 24px;
}
.card-soft {
  border: 1px solid rgba(255,255,255,0.1);
  background: linear-gradient(to bottom, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
  border-radius: 28px;
  padding: 24px;
}
.story h2, .flow h2, .values h2 {
  margin-top: 12px;
  font-size: 38px;
  font-weight: 800;
}
.story .body, .soft-body {
  margin-top: 24px;
  display: grid;
  gap: 20px;
  color: rgba(255,255,255,0.76);
  font-size: 17px;
}
.flow {
  background: rgba(255,255,255,0.03);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.flow-list {
  margin-top: 32px;
  display: grid;
  gap: 16px;
}
.flow-item {
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.5);
  border-radius: 24px;
  padding: 20px;
}
.flow-head {
  display: flex;
  align-items: center;
  gap: 12px;
}
.step {
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
}
.flow-item h3 {
  font-size: 22px;
  font-weight: 700;
}
.flow-item p {
  margin-top: 16px;
  color: rgba(255,255,255,0.72);
  font-size: 16px;
}
.value-list {
  margin-top: 32px;
  display: grid;
  gap: 12px;
}
.value-item {
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  border-radius: 18px;
  padding: 16px;
  color: rgba(255,255,255,0.76);
  font-size: 16px;
}
.closing-card {
  margin-top: 40px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,10,10,0.9);
  border-radius: 28px;
  padding: 24px;
}
.closing-card .eyebrow { color: rgba(255,255,255,0.45); }
.closing-card h3 {
  margin-top: 12px;
  font-size: 38px;
  font-weight: 800;
}
.closing-card p {
  margin-top: 20px;
  color: rgba(255,255,255,0.76);
  font-size: 17px;
}
.image-wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 20px 56px;
}
.section-image {
  display: block;
  width: 100%;
  height: 320px;
  object-fit: cover;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
}
.story-split {
  display: grid;
  gap: 20px;
}
.note {
  max-width: 520px;
  margin: 0 auto;
  padding: 18px 20px 40px;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}
@media (max-width: 640px) {
  .hero h1 { font-size: 34px; }
  .hero .intro { font-size: 16px; }
  .story h2, .flow h2, .values h2, .closing-card h3 { font-size: 30px; }
  .section-image { height: 260px; }
  .container { padding-top: 84px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="lang-switcher">
    <button data-lang="KR" class="active">KR</button>
    <button data-lang="EN">EN</button>
    <button data-lang="CN">CN</button>
  </div>

  <section class="section hero">
    <div class="container">
      <p class="eyebrow" data-i18n="topLabel"></p>
      <h1 data-i18n="heroTitle"></h1>
      <p class="intro" data-i18n="heroIntro"></p>
    </div>
    <div class="container-wide">
      <img src="images/main.webp" alt="메인 전시 이미지" class="section-image" />
    </div>
  </section>

  <section class="section story">
    <div class="container">
      <div class="card">
        <p class="eyebrow" data-i18n="brandStoryLabel"></p>
        <h2 data-i18n="brandStoryTitle"></h2>
        <div class="body">
          <p data-i18n="brandStoryP1"></p>
          <p data-i18n="brandStoryP2"></p>
          <p data-i18n="brandStoryP3"></p>
        </div>
      </div>
    </div>
    <div class="image-wrap">
      <img src="images/story.webp" alt="신사라를 제주 땅에 심는 장면" class="section-image" />
    </div>
  </section>

  <section class="section flow">
    <div class="container">
      <p class="eyebrow" data-i18n="storyFlowLabel"></p>
      <h2 data-i18n="storyFlowTitle"></h2>
      <div class="flow-list" id="flowList"></div>
    </div>
    <div class="image-wrap">
      <img src="images/flow.webp" alt="신사라 식물 이미지" class="section-image" />
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="story-split">
        <div class="card-soft">
          <p class="eyebrow" data-i18n="whyHanjiLabel"></p>
          <h3 style="margin-top:12px;font-size:30px;font-weight:800;" data-i18n="whyHanjiTitle"></h3>
          <div class="soft-body">
            <p data-i18n="whyHanjiDesc"></p>
          </div>
        </div>

        <div class="card-soft">
          <p class="eyebrow" data-i18n="whyJejuLabel"></p>
          <h3 style="margin-top:12px;font-size:30px;font-weight:800;" data-i18n="whyJejuTitle"></h3>
          <div class="soft-body">
            <p data-i18n="whyJejuDesc"></p>
          </div>
        </div>
      </div>
    </div>
    <div class="image-wrap">
      <img src="images/hanji.webp" alt="한지 제작 과정" class="section-image" />
    </div>
  </section>

  <section class="section values" style="border-top:1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);">
    <div class="container">
      <p class="eyebrow" data-i18n="valuesLabel"></p>
      <h2 data-i18n="valuesTitle"></h2>
      <div class="value-list" id="valueList"></div>

      <div class="closing-card">
        <p class="eyebrow" data-i18n="closingLabel"></p>
        <h3 data-i18n="closingTitle"></h3>
        <p data-i18n="closingDesc"></p>
      </div>
    </div>
    <div class="image-wrap">
      <img src="images/final.webp" alt="완성된 한지 작품" class="section-image" />
    </div>
  </section>

</div>

  },

const flowList = document.getElementById("flowList");
const valueList = document.getElementById("valueList");
const textNodes = document.querySelectorAll("[data-i18n]");
const buttons = document.querySelectorAll("[data-lang]");

function render(lang) {
  const t = translations[lang];
  textNodes.forEach((node) => {
    const key = node.dataset.i18n;
    node.textContent = t[key];
  });

  flowList.innerHTML = t.storyFlowItems.map((item) => `
    <div class="flow-item">
      <div class="flow-head">
        <div class="step">${item.step}</div>
        <h3>${item.title}</h3>
      </div>
      <p>${item.desc}</p>
    </div>
  `).join("");

  valueList.innerHTML = t.values.map((item) => `
    <div class="value-item">${item}</div>
  `).join("");

  buttons.forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });

  document.documentElement.lang = lang === "KR" ? "ko" : lang === "EN" ? "en" : "zh";
}

buttons.forEach((btn) => {
  btn.addEventListener("click", () => render(btn.dataset.lang));
});

render("KR");
</script>
</body>
</html>

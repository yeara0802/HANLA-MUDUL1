    *{box-sizing:border-box}

    .hero-card h2,.detail-card h2{margin:12px 0 0;font-size:32px;line-height:1.1}
    .hero-card p,.detail-card p,.section-card p{white-space:pre-line}
    .muted{color:rgba(255,255,255,.62)}
    .soft2{color:rgba(255,255,255,.68)}
    .smallcaps{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:rgba(255,255,255,.4)}
    .work-list{display:grid;gap:12px;margin-top:20px}
    .work-card{width:100%;text-align:left;cursor:pointer;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:20px;padding:16px;color:#fff}
    .work-card h3{margin:0;font-size:18px}
    .work-card p{margin:6px 0 0;font-size:12px;line-height:1.6;color:rgba(255,255,255,.55);white-space:pre-line}
    .detail-card .divider{height:1px;background:rgba(255,255,255,.1);margin:24px 0}
    img{display:block;width:100%;border-radius:20px;object-fit:cover;box-shadow:0 12px 28px rgba(0,0,0,.35)}
    .notice{margin-top:28px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);border-radius:18px;padding:14px;font-size:12px;line-height:1.8;color:rgba(255,255,255,.55);white-space:pre-line}
    .copyright{margin-top:40px;text-align:center;font-size:10px;line-height:1.8;color:rgba(255,255,255,.32);white-space:pre-line}
    .stack{display:grid;gap:16px}
    .section-card h4{margin:0;font-size:14px}
    .section-values{display:grid;gap:12px;margin-top:16px}
    .value{border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);border-radius:18px;padding:14px;font-size:14px;line-height:1.8;color:rgba(255,255,255,.68);white-space:pre-line}
    .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,.90);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.1)}
    .nav .inner{max-width:420px;margin:0 auto;display:flex}
    .nav button{flex:1;border:none;background:none;color:rgba(255,255,255,.55);padding:16px 0;cursor:pointer;font-size:12px;font-weight:500}
    .nav button.active{background:#fff;color:#000}
    .back-btn{border:none;background:none;color:rgba(255,255,255,.55);padding:0;cursor:pointer;font-size:12px}
    .title-big{font-size:28px;font-weight:700;line-height:1.15;margin:0}
    .subtitle{margin-top:12px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.50);white-space:pre-line}
    .body{margin-top:24px;font-size:14px;line-height:2;color:rgba(255,255,255,.88);white-space:pre-line}
  </style>

          section1Body: "Hanji made from Sinsara, a rare plant said to bloom only once in a hundred years, holds a powerful vitality that can endure for a thousand years, and even as long as ten thousand.\n\nBy layering digital imagery onto its surface, the work is reinterpreted into a new form where the texture of tradition and the sensibility of the present exist together.",

          section2Body: "Jeju is not simply a place of beautiful scenery.\nIt is a space made of symbols rooted in lived experience.\n\nThe sea, haenyeo, horses, stones, wind, and tangerines.\nEach of them carries a story.\n\nWe leave these symbols behind not as souvenirs,\nbut as memory.",

          section1Title: "为什么是“新纱罗韩纸”？",
          section1Body: "以据说百年才开一次花的珍贵植物“新纱罗”制成的韩纸，拥有极强的生命力，可保存千年，甚至长达万年。\n\n当数字图像被叠加在这张纸上，它便被重新诠释为一种新的作品形式，让传统的质感与当代的感官在同一画面中并存。",

          section2Title: "为什么是“济州”？",

      worksByLang: {
        KR: [
          {id:"haenyeo",title:"해녀",subtitle:"저승 문턱에서 캐온 전복, 이승의 보리밥이 되다",story:"열다섯, 바다가 무서운 줄도 모르고 엄마 등허리만 쫓아 꽁꽁 언 겨울 바다로 뛰어들던 꼬마 해녀가 있었어요.\n\n칼바람에 입술이 새파랗게 질려 뭍으로 나오면, 타닥타닥 타오르는 '불턱(모닥불 피우는 곳)'은 유일한 천국이었죠.\n\n제주 할망들의 입버릇 같은 말이 있어요.\n\"저승에서 벌어다 이승에서 쓴다\"고요.\n\n숨이 턱 막히는 캄캄한 바닷속, '딱 한 번만 더, 전복 하나만 더!' 목숨을 건 그 물질 한 번이 내 새끼들 배불릴 보리밥 한 그릇이었으니까요.\n\n억척스럽지만 눈물 나게 숭고한, 제주의 푸른 어머니들 이야기입니다.",image:"./images/haenyeo.jpg"},
          {id:"stone",title:"돌하르방",subtitle:"매서운 하늬바람도 끄떡없는 제주의 호통 할아버지",story:"툭 치면 부서질 듯 거친 현무암을 평생 어루만진 늙은 '돌챙이(석수장이)'.\n\n그의 뭉툭한 손끝에서 제주의 듬직한 어른, 돌하르방이 태어났습니다.\n\n성문 앞에 우뚝 서서 뺨을 때리는 거센 하늬바람을 묵묵히 맞다 보니, 세월이 흘러 얼굴엔 푸릇푸릇한 이끼가 수염처럼 피어났죠.\n\n그래도 두 눈망울은 부리부리, 입술은 꾹 다문 채로 \"어디 감히 우리 마을에 못된 것들이 들어와!\" 하고 호통을 치는 것 같습니다.\n\n제주의 온갖 역병과 액운을 쫓아내는 든든하고 고집스러운 수호신 전설이랍니다.",image:"./images/stone.jpg"},
          {id:"tangerine",title:"귤",subtitle:"밤마다 뜨거운 물을 부었던 애물단지, '대학나무'로 환골탈태!",story:"옛날 옛적 조선시대, 귤나무는 농부들에게 꼴도 보기 싫은 '애물단지'였습니다.\n\n관아에서 귤 개수까지 장부에 적어가며 탈탈 털어가니, 얼마나 열이 받았으면 한밤중에 몰래 나무뿌리에 펄펄 끓는 물을 부어 죽여버렸을까요.\n\n하지만 1970년대, 대반전이 일어납니다!\n\n보리밭을 갈아엎고 애지중지 키운 귤나무가 황금알을 낳기 시작한 거죠.\n\n\"요 귤나무 두세 그루만 있으믄, 우리 집 강아지들도 만 원짜리를 물고 다니고 아들내미는 서울로 대학 보낸다!\"\n\n샛노란 귤 한 알에 자식의 번듯한 미래를 담았던, 제주 농부들의 땀방울 맺힌 해피엔딩 스토리입니다.",image:"./images/tangerine.jpg"},
          {id:"horse",title:"말",subtitle:"휘몰아치는 눈보라를 뚫는 제주의 카우보이, 말테우리",story:"눈보라가 뺨을 사정없이 때리는 한겨울의 척박한 중산간.\n\n억새밭을 헤치고 나아가는 제주의 영원한 목자, '말테우리' 할아버지가 등장합니다!\n\n\"말은 땀나게 부리곡, 소는 혀 나오게 부리라!\"\n\n옛말을 가슴에 품은 할아버지는, 매서운 눈길을 피해 말들이 쉴 수 있는 오름 구석구석을 내 집 안방처럼 꿰뚫고 있었죠.\n\n거센 바람 속에서 \"에~허!\" 하고 구성지게 소리치면?\n사방에 흩어져 있던 조랑말들이 귀를 쫑긋 세우고 할아버지 곁으로 쪼르르 달려왔답니다.\n\n거친 자연 속에서 사람과 짐승이 나눈 끈끈한 우정 이야기죠.",image:"./images/horse.jpg"},
          {id:"sea",title:"바다",subtitle:"바람의 여신 '영등할망'의 츤데레 선물과 파도 타는 뗏목 '테우'",story:"음력 2월 초하루,\n제주 바다에 매서운 바람이 불어닥치면 어르신들은 씩 웃으며 말합니다.\n\n\"오호라, 영등할망 오셨네!\"\n\n겉보기엔 거센 비바람으로 배를 묶어두게 만드는 괴팍한 신 같지만,\n사실 할망의 치마폭엔 전복, 소라, 미역 씨앗이 한가득 들어있어요.\n\n바다 구석구석 해산물 씨앗을 넉넉하게 흩뿌려주고,\n쿨하게 떠나는 제주의 '츤데레 여신'이랍니다.\n\n할망이 풍년의 씨앗을 뿌리고 가면,\n어부들은 통나무를 투박하게 엮은 뗏목 '테우'를 띄웁니다.\n\n아무리 거센 파도도 서핑보드처럼 유연하게 넘나드는 테우 위에서,\n어부들은 영차영차 은빛 자리돔을 낚아 올렸죠.\n\n두려움과 고마움이 넘실대는 진짜 제주의 바다 이야기입니다.",image:"./images/sea.jpg"}
        ],
        EN: [
          {id:"haenyeo",title:"Haenyeo",subtitle:"Abalone gathered from the threshold of death became barley rice in this world",story:"There was once a little haenyeo who, at fifteen, followed only the line of her mother's back and dove into the frozen winter sea before she even knew fear.\n\nWhen she came back ashore with her lips turned blue from the cutting wind, the crackling bulteok, the place where the fire burned, was the only heaven she knew.\n\nThe old women of Jeju have a saying they repeat like a habit:\n\"You earn it in the next world and spend it in this one.\"\n\nIn the dark sea where breath tightened in the chest, she told herself, \"Just one more time. Just one more abalone.\" That single dive, made at the edge of life, was what became a bowl of barley rice for her children.\n\nIt is the story of Jeju's blue mothers, relentless, tearful, and deeply noble.",image:"./images/haenyeo.jpg"},
          {id:"stone",title:"Dol Hareubang",subtitle:"Jeju's gruff grandfather who does not flinch before the fiercest wind",story:"An old stone craftsman, who spent his life touching rough basalt that seemed as though it might crack at a single strike, shaped with his blunt hands one of Jeju's most steadfast elders: Dol Hareubang.\n\nStanding firmly before the village gate, bearing the harsh sea wind that slapped across his face, he weathered the passing years until green moss grew upon him like a beard.\n\nAnd yet his eyes still seem sharp, his lips still tightly set, as if he were shouting, \"How dare anything wicked enter our village!\"\n\nHe remains the stubborn and dependable guardian spirit of Jeju, believed to drive away plague, misfortune, and all things ill-intentioned.",image:"./images/stone.jpg"},
          {id:"tangerine",title:"Tangerine",subtitle:"The troublesome tree that became a 'college tree' overnight",story:"Long ago, during the Joseon era, tangerine trees were considered nothing but a burden by many farmers. The officials counted every fruit in their ledgers and took them away so thoroughly that, in anger, some farmers would secretly pour boiling water onto the roots at night to kill the trees.\n\nBut in the 1970s, everything changed. A dramatic reversal began. The tangerine trees that farmers carefully raised after tearing up their barley fields began to yield golden profit.\n\nPeople said, \"With just a few of these trees, even the family dog will carry ten-thousand-won bills in its mouth, and the son will go to college in Seoul.\"\n\nInside one bright yellow tangerine lay the hope of a child's future. It is the hard-earned, almost miraculous happy ending written by the sweat of Jeju's farmers.",image:"./images/tangerine.jpg"},
          {id:"horse",title:"Horse",subtitle:"Jeju's cowboy, the malteuri, riding through a storm of snow",story:"In the barren mid-mountain fields of winter, where snow and wind strike the face without mercy, there appears Jeju's eternal herdsman: the old malteuri.\n\nPushing through the silver grass with practiced ease, he carries in his chest an old saying: \"Work the horse until it sweats; work the cow until its tongue hangs out.\" He knew every corner of the oreum where the horses could rest away from the bitter snow as though it were his own home.\n\nWhen he called out, \"Eo-heo!\" into the driving wind, the ponies scattered across the fields would prick up their ears and run back toward him.\n\nIt is a story of deep companionship between humans and animals, shaped in the harsh and beautiful wildness of Jeju.",image:"./images/horse.jpg"},
          {id:"sea",title:"Sea",subtitle:"The tsundere gifts of Yeongdeung Halmang, goddess of wind, and the wave-riding raft called teu",story:"On the first day of the second lunar month, when a sharp wind begins to sweep across the sea of Jeju, the elders smile and say, \"Ah, Yeongdeung Halmang has arrived.\"\n\nAt first glance she seems like a temperamental deity who ties up boats with fierce wind and rain. But hidden in the folds of her skirt are seeds of abalone, conch, and seaweed. She scatters the seeds of abundance throughout the sea and then leaves as coolly as she came. That is why she is remembered as Jeju's own tsundere goddess.\n\nAfter she has spread the seeds of a good harvest, the fishermen set out on a teu, a raft roughly bound together from logs. On that raft, slipping across the waves as lightly as a surfboard, they pull up shining schools of fish from the sea.\n\nIt is the true story of Jeju's sea, filled at once with fear, gratitude, and wonder.",image:"./images/sea.jpg"}
        ],
        CN: [
          {id:"haenyeo",title:"海女",subtitle:"从生死边缘采来的鲍鱼，成了此岸的一碗麦饭",story:"曾有一个小海女，十五岁时还不懂得害怕，只知道跟着母亲的背影，一头扎进冰冷刺骨的冬海。\n\n当她带着被寒风吹得发紫的嘴唇回到岸上时，那噼啪燃烧着的“불턱”，也就是海边生火取暖的地方，就是她唯一的天堂。\n\n济州老奶奶们总爱说一句话：\n\"在阴间挣来的钱，拿到阳间来花。\"\n\n在那片让人喘不过气的漆黑海底，她一次次告诉自己：\"再来一次，再多采一个鲍鱼。\" 那一次次拿命换来的下潜，最后变成了孩子们饭碗里的一碗麦饭。\n\n这是属于济州蓝色母亲们的故事，倔强、辛苦、令人心酸，却也无比崇高。",image:"./images/haenyeo.jpg"},
          {id:"stone",title:"石头爷爷",subtitle:"连最凛冽的海风也吹不倒的济州老爷爷",story:"有一位年迈的石匠，一生都在抚摸那种仿佛一碰就会裂开的粗糙玄武岩。就在他粗钝却有力的手中，济州最可靠的长者——石头爷爷，诞生了。\n\n他站在城门口，默默承受着迎面抽打而来的冷风。岁月久了，脸上甚至长出了像胡子一样青绿的苔藓。\n\n可即便如此，他的眼神仍然锐利，嘴唇仍旧紧闭，仿佛在大声呵斥：\"哪里来的坏东西，竟敢闯进我们的村子！\"\n\n他就是济州人心里那个倔强、可靠、能驱散瘟疫与厄运的守护神传说。",image:"./images/stone.jpg"},
          {id:"tangerine",title:"橘子",subtitle:"曾被泼热水的累赘，最后却成了“大学树”",story:"很久以前，在朝鲜时代，橘子树对农民来说几乎是怎么看都不顺眼的“累赘”。官府连橘子的数量都要登记在册，一颗颗收走，逼得有些人气到半夜偷偷往树根浇滚烫的热水，想把树活活烫死。\n\n可到了1970年代，一切迎来了大逆转。农民们翻掉麦田，细心栽种的橘子树开始像会下金蛋一样带来收入。\n\n人们说：\"只要有两三棵橘子树，我们家的狗嘴里都能叼着万元钞票，儿子也能送到首尔上大学。\"\n\n一颗金黄的小橘子里，装下的是一个家庭对未来的希望。这是济州农民用汗水换来的、真正带着幸福意味的结局。",image:"./images/tangerine.jpg"},
          {id:"horse",title:"马",subtitle:"穿越暴风雪的济州牛仔——马倌",story:"在寒冬里荒凉的中山间地带，风雪无情地抽打着人的脸，这时总会出现济州永远的牧者——那位放马的老马倌。\n\n他拨开芒草前行，心里一直记着一句老话：\"使唤马要使唤到它出汗，使唤牛要使唤到它吐舌头。\" 他对每一座能让马群避风休息的小山丘都熟得像自家院子。\n\n当他在狂风中高声喊出一句\"诶——呵！\"时，原本四散各处的小马驹们便会立刻竖起耳朵，朝他奔跑而来。\n\n这是一个诞生于严酷自然之中的故事，讲的是人与动物之间那种深厚、结实而温暖的情谊。",image:"./images/horse.jpg"},
          {id:"sea",title:"大海",subtitle:"风之女神“迎灯奶奶”的傲娇礼物，与乘浪而行的木筏“테우”",story:"每到农历二月初一，当凛冽的风吹向济州海面时，老人们总会笑着说：\"哦，迎灯奶奶来了。\"\n\n乍看之下，她像是一位脾气古怪的神，只会用狂风暴雨把船困在岸边。可实际上，她的裙摆里装满了鲍鱼、海螺和海带的种子。她会把这些丰收的种子大方地撒向海里的每个角落，然后又潇洒地离开。因此，人们也把她看作济州特有的“傲娇女神”。\n\n等她撒下丰收的种子之后，渔夫们便会把用原木粗粗扎成的木筏“테우”推向大海。那木筏在浪头之间穿行，灵活得像冲浪板一样。渔夫们就在那上面一边用力吆喝，一边把闪着银光的鱼群拉上来。\n\n这就是济州真正的大海故事，里面既有敬畏，也有感激，还有人们与大海共同生活的重量。",image:"./images/sea.jpg"}
        ]
      }
    };
    let lang = "KR";
    let page = "edition";
    let selectedWorkId = null;
    function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function nl2br(s){return esc(s).replace(/\n/g,"<br>")}
    function renderLangButtons(){
      const c=document.getElementById("langButtons");
      c.innerHTML=["KR","EN","CN"].map(code=>`<button class="${lang===code?"active":""}" onclick="setLang('${code}')">${code}</button>`).join("");
    }
    function renderNav(){
      const t=DATA.labels[lang], c=document.getElementById("navButtons");
      c.innerHTML=`<button class="${page==="edition"?"active":""}" onclick="goPage('edition')">${esc(t.edition)}</button><button class="${page==="brand"?"active":""}" onclick="goPage('brand')">${esc(t.brand)}</button>`;
    }
    function renderEdition(){
      const t=DATA.labels[lang], works=DATA.worksByLang[lang];
      if(!selectedWorkId){
        return `<div class="header"><p>${esc(t.header)}</p></div>
        <div class="hero-card"><p class="smallcaps">${esc(t.archiveNote)}</p><h2>${esc(t.editionTitle)}</h2><p class="subtitle muted">${nl2br(t.editionIntro)}</p></div>
        <div class="work-list">${works.map(work=>`<button class="work-card" onclick="openWork('${work.id}')"><h3>${esc(work.title)}</h3><p>${nl2br(work.subtitle)}</p></button>`).join("")}</div>
        <div class="copyright">${nl2br(t.copyright)}</div>`;
      }
      const work=works.find(w=>w.id===selectedWorkId);
      return `<div class="header"><p>${esc(t.header)}</p></div>
      <div class="detail-card"><button class="back-btn" onclick="closeWork()">${esc(t.back)}</button>
      <h2 class="title-big" style="margin-top:20px;">${esc(work.title)}</h2>
      <p class="subtitle">${nl2br(work.subtitle)}</p><div class="divider"></div>
      ${work.image?`<img src="${work.image}" alt="${esc(work.title)}" />`:""}
      <p class="body">${nl2br(work.story)}</p>
      <div class="notice">${nl2br(t.notice)}</div></div>
      <div class="copyright">${nl2br(t.copyright)}</div>`;
    }
    function renderBrand(){
      const t=DATA.labels[lang], brand=DATA.brandByLang[lang];
      return `<div class="header"><p>${esc(t.header)}</p></div>
      <div class="stack">
        <div class="hero-card">
          <p class="smallcaps">${esc(t.brandStoryLabel)}</p>
          <h2>${esc(brand.title)}</h2>
          <p class="body" style="margin-top:16px;">${nl2br(brand.headline)}</p>
          <p class="subtitle muted">${nl2br(brand.intro)}</p>
          ${brand.heroImage?`<img style="margin-top:24px;" src="${brand.heroImage}" alt="brand visual" />`:""}
        </div>
        <div class="section-card">
          <h4>${esc(brand.section1Title)}</h4>
          <p class="subtitle soft2">${nl2br(brand.section1Body)}</p>
          ${brand.section1Image?`<img style="margin-top:24px;" src="${brand.section1Image}" alt="section 1 image" />`:""}
        </div>
        <div class="section-card">
          <h4>${esc(brand.section2Title)}</h4>
          <p class="subtitle soft2">${nl2br(brand.section2Body)}</p>
          ${brand.section2Image?`<img style="margin-top:24px;" src="${brand.section2Image}" alt="section 2 image" />`:""}
        </div>
        <div class="section-card">
          <h4>${esc(brand.section3Title)}</h4>
          <div class="section-values">
            <div class="value">${nl2br(brand.value1)}</div>
            <div class="value">${nl2br(brand.value2)}</div>
            <div class="value">${nl2br(brand.value3)}</div>
          </div>
        </div>
      </div>`;
    }
    function render(){renderLangButtons();renderNav();document.getElementById("app").innerHTML=page==="edition"?renderEdition():renderBrand()}
    function setLang(next){lang=next;selectedWorkId=null;render()}
    function goPage(next){page=next;selectedWorkId=null;render()}
    function openWork(id){selectedWorkId=id;render()}
    function closeWork(){selectedWorkId=null;render()}
    render();
  </script>
</body>
</html>
